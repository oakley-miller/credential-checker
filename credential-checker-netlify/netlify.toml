  status = 200

[[redirects]]
  from = "/api/test-truv"
  to = "/.netlify/functions/test-truv"
  status = 200

[[redirects]]
  from = "/api/test-accountchek"
  to = "/.netlify/functions/test-accountchek"
  status = 200
